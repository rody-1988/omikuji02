<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ガネーちゃんのおみくじ☕️</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page">
      <header class="page__header">
        <div class="page__header-emoji animate-float">☕️</div>
        <h1 class="page__title">今日を整える一杯</h1>
        <p class="page__subtitle">Gane-chan's Fortune</p>
      </header>

      <main class="main">
        <div id="result-card" class="glass-card result-card">
          <div id="result-glow" class="result-card__glow"></div>

          <p class="result-card__label">TODAY'S MESSAGE</p>
          <div id="result-title" class="result-card__title">—</div>
          <p id="result-message" class="result-card__message">
            リラックスして、<br />ボタンをタップしてみてね。
          </p>
        </div>

        <button id="draw-btn" type="button" class="btn-draw">運勢を淹れる</button>
      </main>

      <footer class="page__footer">&copy; Gane-chan Creative & Fortune</footer>
    </div>

    <script src="js/main.js" defer></script>
  </body>
</html>
